<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milkdown RTL Test - Hebrew Support</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .test-container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .description {
      color: #666;
      margin-bottom: 30px;
    }

    #editor {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 16px;
      min-height: 300px;
      background: #fafafa;
    }

    .test-buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-hebrew {
      background: #6366f1;
      color: white;
    }

    .btn-hebrew:hover {
      background: #4f46e5;
    }

    .btn-english {
      background: #10b981;
      color: white;
    }

    .btn-english:hover {
      background: #059669;
    }

    .btn-mixed {
      background: #f59e0b;
      color: white;
    }

    .btn-mixed:hover {
      background: #d97706;
    }

    .btn-clear {
      background: #ef4444;
      color: white;
    }

    .btn-clear:hover {
      background: #dc2626;
    }

    .results {
      margin-top: 30px;
      padding: 20px;
      background: #f0fdf4;
      border-radius: 6px;
      border-left: 4px solid #10b981;
    }

    .results h3 {
      margin-top: 0;
      color: #059669;
    }

    .result-item {
      margin: 10px 0;
      padding: 8px;
      background: white;
      border-radius: 4px;
    }

    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status.pass {
      background: #d1fae5;
      color: #065f46;
    }

    .status.fail {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>🧪 Milkdown RTL Test - Hebrew Support</h1>
    <p class="description">
      Testing Milkdown editor with Hebrew (RTL) text support.
      Click buttons below to test different scenarios.
    </p>

    <div id="editor-loading" class="loading">
      Loading Milkdown editor from CDN...
    </div>
    <div id="editor" style="display: none;"></div>

    <div class="test-buttons">
      <button class="btn-hebrew" onclick="testHebrew()">Test Hebrew (עברית)</button>
      <button class="btn-english" onclick="testEnglish()">Test English</button>
      <button class="btn-mixed" onclick="testMixed()">Test Mixed (עברית + English)</button>
      <button class="btn-clear" onclick="clearEditor()">Clear</button>
    </div>
  </div>

  <div class="test-container results" id="results" style="display: none;">
    <h3>✅ Test Results</h3>
    <div id="results-content"></div>
  </div>

  <!-- Milkdown Dependencies -->
  <script type="module">
    import { Editor, rootCtx, defaultValueCtx } from 'https://cdn.jsdelivr.net/npm/@milkdown/core@7.3.6/+esm';
    import { commonmark } from 'https://cdn.jsdelivr.net/npm/@milkdown/preset-commonmark@7.3.6/+esm';
    import { nord } from 'https://cdn.jsdelivr.net/npm/@milkdown/theme-nord@7.3.6/+esm';
    import { listener, listenerCtx } from 'https://cdn.jsdelivr.net/npm/@milkdown/plugin-listener@7.3.6/+esm';

    let editor;

    // Test data
    window.testData = {
      hebrew: '# שלום עולם\n\nזהו טקסט בעברית. עברית היא שפה שנכתבת מימין לשמאל.\n\n- פריט ראשון\n- פריט שני\n- פריט שלישי\n\n**טקסט מודגש** ו*טקסט נטוי*',
      english: '# Hello World\n\nThis is English text. English is written left-to-right.\n\n- First item\n- Second item\n- Third item\n\n**Bold text** and *italic text*',
      mixed: '# שלום Hello עולם World\n\nזה mixed text עם עברית and English.\n\n- Hebrew: עברית\n- English: English\n- Mixed: עברית English עברית\n\n**מודגש bold** and *נטוי italic*'
    };

    // Initialize editor
    async function initEditor() {
      try {
        console.log('Initializing Milkdown...');

        editor = await Editor.make()
          .config((ctx) => {
            ctx.set(rootCtx, document.getElementById('editor'));
            ctx.set(defaultValueCtx, '# Welcome! ברוכים הבאים!\n\nClick a button above to test RTL support.');
          })
          .config(nord)
          .use(commonmark)
          .use(listener)
          .create();

        console.log('Milkdown initialized successfully!');

        document.getElementById('editor-loading').style.display = 'none';
        document.getElementById('editor').style.display = 'block';

        // Show success
        showResults('Editor Loaded', 'Milkdown initialized successfully', true);

      } catch (error) {
        console.error('Error initializing Milkdown:', error);
        document.getElementById('editor-loading').innerHTML =
          `<div style="color: red;">❌ Error loading Milkdown: ${error.message}</div>
           <p>This test page requires internet connection to load Milkdown from CDN.</p>`;
        showResults('Editor Load Failed', error.message, false);
      }
    }

    // Test functions
    window.testHebrew = async function() {
      try {
        await editor.action((ctx) => {
          const view = ctx.get(rootCtx);
          const state = view.state;
          const tr = state.tr.insertText(window.testData.hebrew, 0, state.doc.content.size);
          view.dispatch(tr);
        });

        checkRTL('Hebrew');
        showResults('Hebrew Test', 'Hebrew text inserted successfully', true);
      } catch (error) {
        console.error('Hebrew test error:', error);
        showResults('Hebrew Test', error.message, false);
      }
    };

    window.testEnglish = async function() {
      try {
        await editor.action((ctx) => {
          const view = ctx.get(rootCtx);
          const state = view.state;
          const tr = state.tr.insertText(window.testData.english, 0, state.doc.content.size);
          view.dispatch(tr);
        });

        checkRTL('English');
        showResults('English Test', 'English text inserted successfully', true);
      } catch (error) {
        console.error('English test error:', error);
        showResults('English Test', error.message, false);
      }
    };

    window.testMixed = async function() {
      try {
        await editor.action((ctx) => {
          const view = ctx.get(rootCtx);
          const state = view.state;
          const tr = state.tr.insertText(window.testData.mixed, 0, state.doc.content.size);
          view.dispatch(tr);
        });

        checkRTL('Mixed');
        showResults('Mixed Text Test', 'Mixed Hebrew/English text inserted successfully', true);
      } catch (error) {
        console.error('Mixed test error:', error);
        showResults('Mixed Test', error.message, false);
      }
    };

    window.clearEditor = async function() {
      try {
        await editor.action((ctx) => {
          const view = ctx.get(rootCtx);
          const state = view.state;
          const tr = state.tr.delete(0, state.doc.content.size);
          view.dispatch(tr);
        });
        showResults('Editor Cleared', 'Content cleared successfully', true);
      } catch (error) {
        console.error('Clear error:', error);
        showResults('Clear Failed', error.message, false);
      }
    };

    // Check RTL rendering
    function checkRTL(testType) {
      setTimeout(() => {
        const editorEl = document.getElementById('editor');
        const paragraphs = editorEl.querySelectorAll('p, h1, h2, li');

        let rtlDetected = false;
        paragraphs.forEach(p => {
          const dir = window.getComputedStyle(p).direction;
          const textAlign = window.getComputedStyle(p).textAlign;

          console.log(`${testType} - Element:`, p.textContent.substring(0, 20), 'dir:', dir, 'align:', textAlign);

          if (dir === 'rtl') {
            rtlDetected = true;
          }
        });

        const hebrewRegex = /[\u0590-\u05FF]/;
        const hasHebrew = editorEl.textContent.match(hebrewRegex);

        if (hasHebrew && !rtlDetected) {
          showResults(
            `${testType} - RTL Detection`,
            '⚠️ Hebrew detected but RTL not applied automatically. May need manual CSS.',
            false
          );
        } else if (hasHebrew && rtlDetected) {
          showResults(
            `${testType} - RTL Detection`,
            '✅ Hebrew detected and RTL direction applied correctly!',
            true
          );
        } else {
          showResults(
            `${testType} - RTL Detection`,
            `LTR text rendered correctly (direction: ${window.getComputedStyle(paragraphs[0]).direction})`,
            true
          );
        }
      }, 500);
    }

    // Show results
    function showResults(title, message, passed) {
      const resultsEl = document.getElementById('results');
      const contentEl = document.getElementById('results-content');

      resultsEl.style.display = 'block';

      const resultItem = document.createElement('div');
      resultItem.className = 'result-item';
      resultItem.innerHTML = `
        <span class="status ${passed ? 'pass' : 'fail'}">${passed ? 'PASS' : 'FAIL'}</span>
        <strong>${title}:</strong> ${message}
      `;

      contentEl.insertBefore(resultItem, contentEl.firstChild);
    }

    // Auto-initialize
    window.addEventListener('load', () => {
      initEditor();
    });
  </script>
</body>
</html>
